{% extends 'base.html' %}

{% block content %}
<form method="post">
    {% csrf_token %}
    {{ validlink }}
    <div>{{ form.non_field_errors }}</div>
    {% for f in form %}
    <p><label for="{{ f.id_for_label }}">{{ f.label }}</label>{{ f }}</p>
    <div>{{ f.errors }}</div>
    {% endfor %}
    <p><button type="submit">Save</button></p>
</form>
{% endblock %}
