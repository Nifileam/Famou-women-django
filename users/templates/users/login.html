{% extends 'base.html' %}

{% block content %}
<form method="post">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ next }}">
    <div>{{ form.non_field_errors }}</div>
    {% for f in form %}
    <p><label for="{{ f.id_for_label }}">{{ f.label }}</label>{{ f }}</p>
    <div>{{ f.errors }}</div>
    {% endfor %}
    <p><button type="submit">Log in</button></p>
    
    <p><a href="{% url 'users:password_reset' %}">Forgot password?</a></p>

    <hr>
    {% if not perms.users.social_auth %}
    <a href="{% url 'social:begin' 'google-oauth2' %}">
    Login with Google
    </a>
    {% endif %}

</form>
{% endblock %}
