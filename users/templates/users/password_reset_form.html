{% extends 'base.html' %}

{% block content %}

<form method="post">
    {% csrf_token %}
    {% for f in form %}
    <p><label for="{{ f.id_for_label }}">{{ f.label }}</label>{{ f }}</p>
    <div>{{ f.errors }}</div>
    {% endfor %}
    <p><button type="submit">Reset password via email</button></p>
</form>

{% endblock %}
